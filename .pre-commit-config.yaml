repos:
  - repo: local
    hooks:
      - id: lint
        name: lint
        language: system
        pass_filenames: false
        entry: just lint
        stages: [pre-commit]
        verbose: true
      - id: test
        name: unit tests
        language: system
        pass_filenames: false
        entry: just test
        stages: [pre-commit]
        verbose: true
