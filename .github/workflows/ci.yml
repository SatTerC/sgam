name: CI

on:
  pull_request:
    branches: ["main"]
  merge_group:
    types: [checks_requested]

jobs:
  lint_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv python install
      - run: uv sync --group dev --locked
      - run: uv run just lint
      - run: uv run just test
