[project]
site_name = "sgam"
site_description = "A Simple Growth/GPP Allocation Model written in Python"
site_author = "Joe Marsh Rossney, Vasilis Myrgiotis"

site_url = "https://satterc.github.io/sgam"
use_directory_urls = false  # TODO: set to true once stable?
copyright = "Copyright &copy; 2026 The authors"

# Katex
extra_javascript = [
    "javascripts/katex.js",
    "https://unpkg.com/katex@0/dist/katex.min.js",
    "https://unpkg.com/katex@0/dist/contrib/auto-render.min.js"
]
extra_css = [
    "https://unpkg.com/katex@0/dist/katex.min.css"
]

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"


# Extensions
# ----------
# see https://zensical.org/docs/setup/extensions/python-markdown-extensions/

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.tilde]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

# Mkdocstrings
# ------------

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
annotations_path = "brief"
docstring_style = "google"
docstring_section_style = "list"
inherited_members = true
line_length = 88
merge_init_into_class = true
separate_signature = true
show_signature = true
signature_crossrefs = true
show_signature_annotations = true
show_if_no_docstring = false
show_root_full_path = true
show_root_heading = true
show_root_members_full_path = false
show_source = false
show_symbol_type_heading = true
show_symbol_type_toc = true

